name: Update AI News Feed

on:
  schedule:
    # Beijing time: 08:05, 12:05, 19:05
    - cron: "5 0 * * *"
    - cron: "5 4 * * *"
    - cron: "5 11 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-news-feed:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build news feed
        run: node scripts/build-news-feed.mjs

      - name: Commit updated feed
        run: |
          if [[ -z "$(git status --porcelain news-feed.json)" ]]; then
            echo "news-feed.json is unchanged."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add news-feed.json
          git commit -m "Update AI news feed"
          git push
